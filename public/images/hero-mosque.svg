  <circle cx="1550" cy="250" r="1" fill="#fff" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="1500" cy="200" r="60" fill="url(#moon)"/>
  <circle cx="1520" cy="190" r="55" fill="url(#sky)"/>
  <!-- Mosque silhouette -->
  <path d="M700 580 L700 700 L1220 700 L1220 580" fill="#0d1a30"/>
  <!-- Main dome -->
  <ellipse cx="960" cy="480" rx="160" ry="120" fill="#0d1a30"/>
  <rect x="800" y="480" width="320" height="220" fill="#0d1a30"/>
  <!-- Minaret left -->
  <rect x="720" y="350" width="30" height="350" fill="#0d1a30"/>
  <ellipse cx="735" cy="350" rx="20" ry="15" fill="#0d1a30"/>
  <rect x="730" y="310" width="10" height="40" fill="#0d1a30"/>
  <circle cx="735" cy="305" r="8" fill="#e0a242" opacity="0.8"/>
  <!-- Minaret right -->
  <rect x="1170" y="350" width="30" height="350" fill="#0d1a30"/>
  <ellipse cx="1185" cy="350" rx="20" ry="15" fill="#0d1a30"/>
  <rect x="1180" y="310" width="10" height="40" fill="#0d1a30"/>
  <circle cx="1185" cy="305" r="8" fill="#e0a242" opacity="0.8"/>
