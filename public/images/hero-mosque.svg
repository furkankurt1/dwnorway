  <circle cx="1700" cy="90" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="300" cy="200" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="600" cy="250" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="1000" cy="180" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="1300" cy="220" r="1.5" fill="#fff" opacity="0.4"/>
