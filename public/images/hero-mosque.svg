<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a3a5c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5f0d0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0a242;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="200" cy="100" r="1.5" fill="#fff" opacity="0.8"/>
