  <circle cx="960" cy="370" r="15" fill="#e0a242" opacity="0.9"/>
  <circle cx="968" cy="366" r="12" fill="#0d1a30"/>
  <!-- Windows -->
  <rect x="870" y="540" width="40" height="60" rx="20" fill="#1a2744" opacity="0.5"/>
