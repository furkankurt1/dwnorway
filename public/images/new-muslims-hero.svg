<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="nm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#e0a242" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1920" height="800" fill="url(#nm)"/>
  <rect width="1920" height="800" fill="url(#dots)"/>
  <!-- Open book silhouette -->
  <g transform="translate(860, 300)" opacity="0.08">
    <path d="M0 100 Q50 70 100 80 L100 -20 Q50 -30 0 0 Z" fill="#e0a242"/>
    <path d="M0 100 Q-50 70 -100 80 L-100 -20 Q-50 -30 0 0 Z" fill="#e0a242"/>
  </g>
</svg>
